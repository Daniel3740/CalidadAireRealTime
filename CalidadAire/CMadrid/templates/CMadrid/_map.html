<!-- Mapa de Leaflet -->
<div id="map" style="height: 600px; width: 100%;"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

<style>
    .google-marker {
        font-size: 40px;
        text-align: center;
        color: #FF0000;
        text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
        font-weight: bold;
    }
</style>

<script>
    // Inicializar el mapa centrado en la Comunidad de Madrid con zoom 11
    var map = L.map('map').setView([40.4168, -3.7038], 11);

    // Añadir capa de tiles de OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Añadir marcadores de estaciones
    var stations = {{ stations|safe }};
    stations.forEach(function(station) {
        // usar latitud/longitud como fuente principal (mantenemos lat/lon por compatibilidad)
        var latitude = station.latitud || station.lat;
        var longitude = station.longitud || station.lon;

        L.marker([latitude, longitude]).addTo(map).bindPopup(
            'Estación: ' + (station.estacion_codigo || station.COD_ESTACION) + '<br>' +
            'Municipio: ' + (station.estacion_municipio || station.NOMBRE_ESTACION) + '<br>' +
            'Dirección: ' + (station.estacion_direccion_postal || station.NOM_TIPO || 'N/A')
        );
    });

    var interpolaciones = {{ interpolaciones|safe }};
    var heatmapGroup = L.layerGroup().addTo(map);

    function getColor(value) {
        if (value === null || value === undefined || isNaN(value)) return '#FFFFFF';
        if (value < 20) return '#00FF00';
        if (value < 40) return '#99FF00';
        if (value < 60) return '#FFFF00';
        if (value < 80) return '#FF9900';
        if (value < 100) return '#FF0000';
        return '#800000';
    }

    function buildHeatmap(contaminante) {
        heatmapGroup.clearLayers();
        var data = interpolaciones[contaminante] || [];
        if (!data.length) {
            console.log('No hay datos de interpolación para', contaminante);
            return;
        }

        var sampleStep = Math.max(1, Math.floor(data.length / 1500));
        data.forEach(function(point, idx) {
            if (idx % sampleStep !== 0) return;
            var lat = point[0];
            var lon = point[1];
            var val = point[2];
            var color = getColor(val);
            heatmapGroup.addLayer(L.circleMarker([lat, lon], {
                radius: 5,
                fillColor: color,
                color: color,
                fillOpacity: 0.55,
                weight: 0
            }).bindPopup('Contaminante: ' + contaminante + '<br>Valor: ' + val));
        });
    }

    var contaminantes = Object.keys(interpolaciones);
    var controlsDiv = L.control({position: 'topright'});
    controlsDiv.onAdd = function() {
        var div = L.DomUtil.create('div', 'info');
        var select = L.DomUtil.create('select', '', div);
        contaminantes.forEach(function(item) {
            var option = document.createElement('option');
            option.value = item;
            option.text = item;
            select.appendChild(option);
        });

        select.onchange = function() {
            buildHeatmap(this.value);
        };

        buildHeatmap(contaminantes[0] || '');
        return div;
    };
    controlsDiv.addTo(map);

    // Variable para almacenar el marcador actual
    var currentMarker = null;

    // Crear un icono personalizado similar a Google Street View
    var customIcon = L.divIcon({
        className: 'google-marker',
        html: '📍',
        iconSize: [40, 40],
        iconAnchor: [20, 40],
        popupAnchor: [0, -40]
    });

    // Añadir funcionalidad de clic: colocar marker único y hacer zoom
    map.on('click', function(e) {
        // Si existe un marcador anterior, removerlo
        if (currentMarker) {
            map.removeLayer(currentMarker);
        }
        // Crear un nuevo marker en la posición del clic con icono personalizado y draggable
        currentMarker = L.marker(e.latlng, { 
            icon: customIcon,
            draggable: true
        }).addTo(map);
        
        // Hacer zoom en esa posición aumentando el zoom en 2 niveles
        // map.setView(e.latlng, map.getZoom() + 2);
        
        // Agregar evento para cuando se arrastra el marcador
        currentMarker.on('dragend', function() {
            var newLatLng = currentMarker.getLatLng();
            console.log('Marcador movido a:', newLatLng.lat, newLatLng.lng);
        });
    });
</script>
